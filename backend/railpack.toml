[options]
pythonVersion = "3.11"

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install --only-binary :all: -r requirements.txt",
]

[start]
cmd = "cd .. && /opt/venv/bin/uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
